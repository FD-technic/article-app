<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout.html :: head('Registrace')}"></head>
<body>
    <header th:replace="~{fragments/layout.html :: header}"></header>
    <div class="py-2 flash-message message-success" th:text="${success}" th:if="${success}"></div>
    <div class="py-2 flash-message message-error" th:if="${param.error}" >Neplatný e-mail nebo heslo!</div>
    <article>
        <div id="centrovac">
            <header>
                <h1>Registrace</h1>
            </header>

            <section>
                <div class="row">
                    <div class="col">
                        <form th:object="${userDTO}" th:action="@{/account/register}" method="post" class="d-flex flex-column gap-2">
                            <div class="form-group">
                                <label for="email">Uživatelský email</label>
                                <input id="email" name="email" th:field="*{email}" class="form-control"/>
                                <small class="text-danger" th:errors="*{email}"></small>
                            </div>
                            <div class="form-group">
                                <label for="password">Heslo</label>
                                <input id="password" name="password" th:field="*{password}" class="form-control"/>
                                <small class="text-danger" th:errors="*{password}">

                                </small>
                            </div>
                            <div class="form-group">
                                <label for="confirm-password">Heslo pro zopakování</label>
                                <input id="confirm-password" name="password" th:field="*{confirmPassword}" class="form-control"/>
                                <small class="text-danger" th:errors="*{confirmPassword}">
                                    <!-- Zde později budeme vypisovat formulářové chyby -->
                                </small>
                            </div>
                            <div class="form-group">
                                <button type="submit" class="clanky-tlacitko align-self-start">Registrace</button>
                            </div>
                            <div class="form-group">
                                <p>
                                    <a th:href="@{/account/register}">Přihlásit se</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </article>

    <footer  th:replace="~{fragments/layout.html :: footer}"></footer>
</body>
</html>
